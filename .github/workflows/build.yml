name: Build and Commit Changes

on:
  workflow_dispatch:    # allows manual run
  push:
    branches:
      - your-feature-branch  # optional, triggers on push

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}  # ensures the feature branch is checked out
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install dependencies (including Babel)
      - name: Install dependencies
        run: |
          npm ci
          npm install --save-dev @babel/register @babel/core @babel/preset-env

      # 4️⃣ Build the project
      - name: Build project
        run: npm run build

      # 5️⃣ Commit and push changes
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add -A
          git reset node_modules

          if ! git diff --cached --quiet; then
            for file in $(git diff --cached --name-only); do
              git commit -m "Add $file :inbox_tray:" -- "$file"
            done
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
